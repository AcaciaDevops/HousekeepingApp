apiVersion: apps/v1
kind: Deployment
metadata:
  name: acacia-maintenance-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acacia-maintenance-app
  template:
    metadata:
      labels:
        app: acacia-maintenance-app
    spec:
      containers:
        - name: acacia-maintenance-app
          image: acacia-maintenance-app:v1
          imagePullPolicy: Never    # ← Use local image, don't pull from registry
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"